# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |

  Two-stage AI ranking pipeline that moves beyond keyword matching to understand
  semantic meaning. Stage 1 scores all 100,000 candidates across five dimensions:
  semantic similarity using sentence embeddings (all-MiniLM-L6-v2), JD-aware skill
  matching with proficiency/duration/endorsement weighting, career relevance based
  on actual work history, education tier and field relevance, and behavioral signals
  including GitHub activity, recruiter response rate, notice period, and location.
  All scoring parameters are extracted dynamically from the JD at runtime — experience
  range, notice limit, required skills, and preferred locations — making the system
  work correctly for any JD without hardcoding. A dynamic title penalty and honeypot
  detection filter out irrelevant and suspicious profiles. Stage 2 runs a cross-encoder
  (ms-marco-MiniLM-L-6-v2) on the top 500 candidates, reading JD and candidate text
  together for deep pairwise relevance scoring. Final score combines 60% cross-encoder
  and 40% Stage 1. Runtime is approximately 3 minutes for 100,000 candidates on CPU
  with no GPU required."

